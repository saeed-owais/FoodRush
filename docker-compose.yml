services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: foodrush-sql
    restart: unless-stopped

    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD}

    ports:
      - "1433:1433"

    volumes:
      - sql_data:/var/opt/mssql

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$SA_PASSWORD -Q 'SELECT 1' -C"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    networks:
      - foodrush-network

  redis:
    image: redis:7
    container_name: foodrush-redis
    restart: unless-stopped

    command: redis-server --appendonly yes

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    networks:
      - foodrush-network

  seq:
    image: datalust/seq:latest
    container_name: foodrush-seq
    restart: unless-stopped

    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"

    ports:
      - "5341:80"

    volumes:
      - seq_data:/data

    networks:
      - foodrush-network

  rabbitmq:
    image: rabbitmq:4-management
    container_name: foodrush-rabbitmq
    restart: unless-stopped

    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}

    ports:
      - "5672:5672"
      - "15672:15672"

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    networks:
      - foodrush-network

  api:
    build:
      context: .
      dockerfile: src/FoodRush.API/Dockerfile

    container_name: foodrush-api
    restart: unless-stopped

    ports:
      - "5000:8080"

    depends_on:
      sqlserver:
        condition: service_healthy

      rabbitmq:
        condition: service_healthy

      redis:
        condition: service_started

      seq:
        condition: service_started

    environment:
      ASPNETCORE_ENVIRONMENT: Development

      JwtSettings__SecretKey: ${JWT_SECRET}
      JwtSettings__Issuer: ${JWT_ISSUER}
      JwtSettings__Audience: ${JWT_AUDIENCE}

      ConnectionStrings__DefaultConnection: Server=sqlserver;Database=FoodRushDB;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True

      Redis__ConnectionString: redis:6379

      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__Username: ${RABBITMQ_USERNAME}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}

      Seq__ServerUrl: http://seq:80

    networks:
      - foodrush-network

volumes:
  sql_data:
  redis_data:
  seq_data:
  rabbitmq_data:

networks:
  foodrush-network:
    driver: bridge