services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: foodrush-sql

    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}

    ports:
      - "1433:1433"

    volumes:
      - sql_data:/var/opt/mssql

    healthcheck:
      test: >
        /opt/mssql-tools18/bin/sqlcmd
        -S localhost
        -U sa
        -P "$$SA_PASSWORD"
        -Q "SELECT 1"
        -C
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: foodrush-redis
    ports:
      - "6379:6379"

  seq:
    image: datalust/seq:latest
    container_name: foodrush-seq

    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true

    ports:
      - "5341:80"

    volumes:
      - seq_data:/data

  api:
    build:
      context: .
      dockerfile: src/FoodRush.API/Dockerfile
    container_name: foodrush-api
    ports:
      - "5000:8080"

    depends_on:
      sqlserver:
          condition: service_healthy
      redis:
          condition: service_started
      seq:
          condition: service_started

    environment:
      - ASPNETCORE_ENVIRONMENT=Development  
      - JwtSettings__SecretKey=${JWT_SECRET}
      - JwtSettings__Issuer=${JWT_ISSUER}
      - JwtSettings__Audience=${JWT_AUDIENCE}

      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=FoodRushDB;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True

volumes:
  sql_data:
  seq_data: